apiVersion: v1
kind: Service
metadata:
  name: {{ include "microshield-bpo.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "microshield-bpo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "microshield-bpo.selectorLabels" . | nindent 4 }}
